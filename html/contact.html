<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <!-- <link rel="stylesheet" href="../css/style.css"> -->
    <link rel="stylesheet" href="../css/contact/desktop.css">
    <link rel="stylesheet" href="../css/contact/tablet.css">
    <link rel="stylesheet" href="../css/contact/mobile.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <header>
        <nav>
            <div class="nav-left">
                <i class="ri-menu-line"></i>
                <div class="img">
                    <img src="../assets/Logo.svg" alt="">
                </div>
            </div>
            <div class="menu">
                <ul>
                    <li>
                        <a href="#" onclick="goToHome()">
                            <p>Home</p>
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="goToAbout()">
                            <p>About</p>
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="goToCourse()">
                            <p>Course</p>
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="goToContact()">
                            <p>Contact Us</p>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="icon">
                <i class="ri-notification-fill"></i>
                <img src="../assets/profil.jpg" alt="">
            </div>
        </nav>
    </header>
    <main>
        <article class="contact-page-wrapper">

            <section class="contact-hero">
                <h1>Contact Us</h1>
            </section>

            <section class="contact-body">

                <div class="contact-heading">
                    <h2>Let's Start a Conversation</h2>
                </div>

                <div class="contact-grid">

                    <form class="contact-form" onsubmit="event.preventDefault();">
                        <div class="form-group">
                            <label for="nama">Nama Lengkap:</label>
                            <input type="text" id="nama" placeholder="example123" required>
                        </div>

                        <div class="form-group">
                            <label for="nim">NIM :</label>
                            <input type="text" id="nim" placeholder="example123" required>
                        </div>

                        <div class="form-group">
                            <label for="prodi">Program Studi</label>
                            <input type="text" id="prodi" placeholder="example123" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Unsoed:</label>
                            <input type="email" id="email" placeholder="example123" required>
                        </div>

                        <div class="form-group">
                            <label for="comment">Comment:</label>
                            <textarea id="comment" placeholder="example123" rows="6" required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">Enter</button>
                    </form>

                    <div class="map-card">
                        <div class="map-image-wrapper">
                            <img src="../assets/gmap.png" alt="InfoLearn Location Map">
                        </div>
                        <div class="map-info-box">
                            <h3>Lorem ipsum dolor amet</h3>
                            <p>lorem ipsum dolor</p>
                            <a href="https://maps.google.com" target="_blank" class="btn-maps">
                                Google Maps &rsaquo;
                            </a>
                        </div>
                    </div>

                </div>

            </section>

        </article>
        <footer>

            <div class="footer-content">

                <div class="brand-side">
                    <div class="footer-logo">
                        <img src="../assets/Logo.svg" alt="Logo InfoLearn">
                    </div>
                    <h3>Landing Page</h3>
                    <ul>
                        <li><a href="">About Us</a></li>
                        <li><a href="">Course</a></li>
                        <li><a href="">Contat Us</a></li>
                    </ul>
                </div>

                <div class="social-side">
                    <h3>Media Sosial</h3>
                    <ul>
                        <li><a href="">Instagram</a></li>
                        <li><a href="">Whatsaap</a></li>
                        <li><a href="">Linkedin</a></li>
                    </ul>
                </div>

            </div>

            <div class="footer-copyright">
                <p>&copy; Copyright - InfoLearn 2026</p>
            </div>

        </footer>
    </main>
    <script src="../js/main.js"></script>
</body>

</html>
