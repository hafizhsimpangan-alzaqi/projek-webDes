<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css" />
</head>

<body>
    <main>
        <div class="card">
            
            <div class="img">
                <img src="/assets/Logo.svg" alt="InfoLearn Logo">
            </div>
            
            <form action="/login" method="post">
                
                <fieldset class="fieldset">
                    <legend class="fieldset-legend">Email:</legend>
                    <input type="email" name="email" class="input" placeholder="example@gmail.com" required />
                </fieldset>
                
                <fieldset class="fieldset">
                    <legend class="fieldset-legend">Password:</legend>
                    <input type="password" name="password" class="input" placeholder="example123" required />
                </fieldset>
                
                <button type="submit" class="btn btn-primary" id="openModal">login</button>
                
            </form>
        </div>
    </main>
    <div class="modal" id="modal">
        <div class="card-modal">
            <button id="closeModal">Close</button>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>

</html>
